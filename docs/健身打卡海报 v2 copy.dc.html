<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  body { margin:0; }
</style>
</helmet>

<div style="width:1080px;height:1440px;position:relative;overflow:hidden;background:#FFFFFF;font-family:'Noto Sans SC',sans-serif;color:#16223D;">

  <!-- gym-floor checker strip at bottom -->
  <div style="position:absolute;left:0;right:0;bottom:0;height:150px;background-image:linear-gradient(45deg,#E9F0FF 25%,transparent 25%,transparent 75%,#E9F0FF 75%),linear-gradient(45deg,#E9F0FF 25%,transparent 25%,transparent 75%,#E9F0FF 75%);background-size:48px 48px;background-position:0 0,24px 24px;opacity:.7;"></div>

  <!-- (clean: floating doodles removed) -->

  <!-- content -->
  <div style="position:relative;padding:64px 60px 54px;height:100%;box-sizing:border-box;display:flex;flex-direction:column;">

    <!-- header row -->
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div>
        <div style="display:inline-block;background:#FFD23F;border:3px solid #16223D;border-radius:999px;padding:5px 18px;font-size:18px;font-weight:800;color:#16223D;">今日运动打卡 ✦</div>
        <div style="font-family:'Fredoka','Noto Sans SC',sans-serif;font-weight:700;font-size:80px;line-height:1;margin-top:10px;color:#16223D;white-space:nowrap;letter-spacing:-1px;">6月18日</div>
        <div style="font-size:21px;color:#7a8499;margin-top:10px;font-weight:600;">周三 · 力量 + 有氧训练</div>
      </div>
      <div style="display:flex;align-items:center;gap:13px;background:#2E5CFF;border:3px solid #16223D;border-radius:18px;padding:13px 20px 13px 15px;box-shadow:5px 5px 0 #16223D;color:#fff;flex:none;">
        <div style="width:50px;height:50px;border-radius:50%;background:#fff;border:3px solid #16223D;display:flex;align-items:center;justify-content:center;flex:none;">
          <svg width="28" height="28" viewBox="0 0 24 24"><path d="M5 13 L10 18 L19 6" stroke="#2E5CFF" stroke-width="3.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div>
          <div style="font-family:'Fredoka','Noto Sans SC',sans-serif;font-size:27px;font-weight:700;line-height:1.05;">全部完成</div>
          <div style="font-size:15px;font-weight:600;opacity:.92;margin-top:2px;">5 项训练 · 100%</div>
        </div>
      </div>
    </div>

    <!-- hero: original flat-style gym illustration -->
    <div style="margin-top:14px;border:3px solid #16223D;border-radius:22px;background:#EAF1FF;overflow:hidden;height:250px;box-shadow:6px 7px 0 #16223D;flex:none;position:relative;">
      <svg viewBox="0 0 960 300" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" style="display:block;">
        <rect x="70" y="22" width="120" height="165" rx="10" fill="#F2F6FF" stroke="#D2E0FA" stroke-width="3"/>
        <rect x="250" y="8" width="140" height="195" rx="10" fill="#F2F6FF" stroke="#D2E0FA" stroke-width="3"/>
        <rect x="770" y="18" width="130" height="175" rx="10" fill="#F2F6FF" stroke="#D2E0FA" stroke-width="3"/>
        <line x1="24" y1="247" x2="936" y2="247" stroke="#BFD0EE" stroke-width="4"/>
        <g stroke="#16223D" stroke-linecap="round" stroke-linejoin="round">
          <line x1="600" y1="4" x2="600" y2="30" stroke-width="3"/>
          <path d="M575 58 A26 26 0 0 1 625 58 Z" fill="#FFD23F" stroke-width="4"/>
          <line x1="600" y1="66" x2="600" y2="78" stroke="#FFB020" stroke-width="3"/>
          <line x1="585" y1="64" x2="579" y2="74" stroke="#FFB020" stroke-width="3"/>
          <line x1="615" y1="64" x2="621" y2="74" stroke="#FFB020" stroke-width="3"/>
        </g>
        <g transform="translate(70,96) scale(2.55)" stroke="#16223D" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <path d="M24 19 Q32 9 40 19" fill="none"/>
          <path d="M25 19 L27 27" fill="none"/>
          <path d="M39 19 L37 27" fill="none"/>
          <path d="M27 27 Q20 31 22 45 Q24 53 32 53 Q40 53 42 45 Q44 31 37 27 Z" fill="#FF6A2B"/>
          <path d="M28 40 Q32 44 36 40" fill="none" stroke="#fff" stroke-width="1.6"/>
        </g>
        <g stroke="#16223D" stroke-width="5" stroke-linejoin="round">
          <path d="M752 224 V214 A68 19 0 0 0 888 214 V224 A68 19 0 0 1 752 224 Z" fill="#152441"/>
          <ellipse cx="820" cy="214" rx="68" ry="19" fill="#2E5CFF"/>
          <ellipse cx="820" cy="214" rx="20" ry="6" fill="#152441"/>
        </g>
        <g transform="rotate(-7 470 150)" stroke="#16223D" stroke-width="5" stroke-linejoin="round" stroke-linecap="round">
          <rect x="395" y="139" width="150" height="22" rx="11" fill="#C9D6F0"/>
          <rect x="360" y="108" width="27" height="84" rx="9" fill="#152441"/>
          <rect x="332" y="121" width="24" height="58" rx="8" fill="#2E5CFF"/>
          <rect x="553" y="108" width="27" height="84" rx="9" fill="#152441"/>
          <rect x="584" y="121" width="24" height="58" rx="8" fill="#2E5CFF"/>
        </g>
        <path d="M898 64 L905 82 L924 83 L909 95 L914 114 L898 103 L882 114 L887 95 L872 83 L891 82 Z" fill="#FFD23F" stroke="#16223D" stroke-width="3" stroke-linejoin="round"/>
        <path d="M250 150 Q262 138 274 150" stroke="#2E5CFF" stroke-width="4" fill="none" stroke-linecap="round"/>
        <path d="M690 120 Q702 108 714 120" stroke="#FF6A2B" stroke-width="4" fill="none" stroke-linecap="round"/>
        <circle cx="470" cy="60" r="5" fill="#2E5CFF"/>
      </svg>
    </div>

    <!-- categories -->
    <div style="flex:1;display:flex;flex-direction:column;gap:10px;justify-content:center;margin-top:14px;">

      <!-- 有氧 -->
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="width:36px;height:36px;border-radius:10px;background:#FF6A2B;border:3px solid #16223D;display:flex;align-items:center;justify-content:center;flex:none;">
          <svg width="20" height="20" viewBox="0 0 24 24"><path d="M12 20.5 C12 20.5 3.5 14 3.5 8.6 A4.4 4.4 0 0 1 12 6.8 A4.4 4.4 0 0 1 20.5 8.6 C20.5 14 12 20.5 12 20.5 Z" fill="#fff"/></svg>
        </div>
        <span style="font-size:23px;font-weight:900;">有氧</span>
        <span style="font-family:'Fredoka',sans-serif;letter-spacing:2px;font-size:14px;color:#FF6A2B;font-weight:600;">CARDIO</span>
        <span style="font-size:14px;color:#9aa3b5;font-weight:700;">1 项</span>
        <div style="flex:1;border-bottom:3px solid #E4E8F2;margin-bottom:5px;"></div>
      </div>

      <!-- 跑步 -->
      <div style="display:flex;align-items:center;gap:18px;background:#fff;border:3px solid #16223D;border-radius:16px;padding:12px 20px;box-shadow:5px 5px 0 #16223D;">
        <div style="width:78px;height:78px;border-radius:16px;background:#FFE7DB;border:3px solid #16223D;display:flex;align-items:center;justify-content:center;flex:none;">
          <svg width="52" height="52" viewBox="0 0 64 64"><g stroke="#16223D" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
            <circle cx="42" cy="13" r="5.5"/><path d="M40 20 L31 35"/><path d="M37 24 L49 21"/><path d="M35 27 L25 31"/><path d="M31 35 L41 41 L46 33"/><path d="M31 35 L24 47 L27 54"/><path d="M9 30 L19 30 M7 39 L15 39"/>
          </g></svg>
        </div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:29px;font-weight:900;">跑步</div>
          <div style="margin-top:8px;">
            <span style="display:inline-block;background:#EEF1F8;border-radius:999px;padding:5px 15px;white-space:nowrap;font-size:18px;font-weight:700;">30 分钟</span>
          </div>
        </div>
        <div style="flex:none;text-align:right;line-height:1;margin-right:4px;white-space:nowrap;">
          <span style="font-family:'Fredoka','Noto Sans SC',sans-serif;font-size:34px;font-weight:700;color:#FF6A2B;">4.3</span><span style="font-size:16px;font-weight:700;color:#FF6A2B;margin-left:3px;">km</span>
        </div>
        <div style="width:36px;height:36px;border-radius:50%;background:#FF6A2B;border:3px solid #16223D;display:flex;align-items:center;justify-content:center;flex:none;">
          <svg width="20" height="20" viewBox="0 0 24 24"><path d="M5 13 L10 18 L19 6" stroke="#fff" stroke-width="3.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>

      <!-- 力量 -->
      <div style="display:flex;align-items:center;gap:12px;margin-top:5px;">
        <div style="width:36px;height:36px;border-radius:10px;background:#2E5CFF;border:3px solid #16223D;display:flex;align-items:center;justify-content:center;flex:none;">
          <svg width="20" height="20" viewBox="0 0 24 24"><g stroke="#fff" stroke-width="2.4" stroke-linecap="round" fill="none"><path d="M4 9 V15 M7.5 6.5 V17.5 M16.5 6.5 V17.5 M20 9 V15 M7.5 12 H16.5"/></g></svg>
        </div>
        <span style="font-size:23px;font-weight:900;">力量</span>
        <span style="font-family:'Fredoka',sans-serif;letter-spacing:2px;font-size:14px;color:#2E5CFF;font-weight:600;">STRENGTH</span>
        <span style="font-size:14px;color:#9aa3b5;font-weight:700;">4 项</span>
        <div style="flex:1;border-bottom:3px solid #E4E8F2;margin-bottom:5px;"></div>
      </div>

      <!-- 哈克深蹲 -->
      <div style="display:flex;align-items:center;gap:18px;background:#fff;border:3px solid #16223D;border-radius:16px;padding:12px 20px;box-shadow:5px 5px 0 #16223D;">
        <div style="width:78px;height:78px;border-radius:16px;background:#E5EBFF;border:3px solid #16223D;display:flex;align-items:center;justify-content:center;flex:none;">
          <svg width="52" height="52" viewBox="0 0 64 64"><g stroke="#16223D" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
            <path d="M10 32 L54 32"/><path d="M17 21 L17 43"/><path d="M24 25 L24 39"/><path d="M47 21 L47 43"/><path d="M40 25 L40 39"/>
          </g></svg>
        </div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:29px;font-weight:900;">哈克深蹲</div>
          <div style="margin-top:8px;">
            <span style="font-family:'Fredoka','Noto Sans SC',sans-serif;display:inline-block;background:#EEF1F8;border-radius:999px;padding:5px 15px;white-space:nowrap;font-size:18px;font-weight:700;">4 组 × 12 次</span>
          </div>
        </div>
        <div style="flex:none;text-align:right;line-height:1;margin-right:4px;white-space:nowrap;">
          <span style="font-family:'Fredoka','Noto Sans SC',sans-serif;font-size:34px;font-weight:700;color:#2E5CFF;">70</span><span style="font-size:16px;font-weight:700;color:#2E5CFF;margin-left:3px;">kg</span>
        </div>
        <div style="width:36px;height:36px;border-radius:50%;background:#2E5CFF;border:3px solid #16223D;display:flex;align-items:center;justify-content:center;flex:none;">
          <svg width="20" height="20" viewBox="0 0 24 24"><path d="M5 13 L10 18 L19 6" stroke="#fff" stroke-width="3.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>

      <!-- 壶铃摇摆 -->
      <div style="display:flex;align-items:center;gap:18px;background:#fff;border:3px solid #16223D;border-radius:16px;padding:12px 20px;box-shadow:5px 5px 0 #16223D;">
        <div style="width:78px;height:78px;border-radius:16px;background:#E5EBFF;border:3px solid #16223D;display:flex;align-items:center;justify-content:center;flex:none;">
          <svg width="50" height="50" viewBox="0 0 64 64"><g stroke="#16223D" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
            <path d="M24 19 Q32 9 40 19"/><path d="M25 19 L27 27"/><path d="M39 19 L37 27"/><path d="M27 27 Q20 31 22 45 Q24 53 32 53 Q40 53 42 45 Q44 31 37 27 Z"/>
          </g></svg>
        </div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:29px;font-weight:900;">壶铃摇摆</div>
          <div style="margin-top:8px;">
            <span style="font-family:'Fredoka','Noto Sans SC',sans-serif;display:inline-block;background:#EEF1F8;border-radius:999px;padding:5px 15px;white-space:nowrap;font-size:18px;font-weight:700;">4 组 × 12 次</span>
          </div>
        </div>
        <div style="flex:none;text-align:right;line-height:1;margin-right:4px;white-space:nowrap;">
          <span style="font-family:'Fredoka','Noto Sans SC',sans-serif;font-size:34px;font-weight:700;color:#2E5CFF;">10</span><span style="font-size:16px;font-weight:700;color:#2E5CFF;margin-left:3px;">kg</span>
        </div>
        <div style="width:36px;height:36px;border-radius:50%;background:#2E5CFF;border:3px solid #16223D;display:flex;align-items:center;justify-content:center;flex:none;">
          <svg width="20" height="20" viewBox="0 0 24 24"><path d="M5 13 L10 18 L19 6" stroke="#fff" stroke-width="3.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>

      <!-- 平板支撑 -->
      <div style="display:flex;align-items:center;gap:18px;background:#fff;border:3px solid #16223D;border-radius:16px;padding:12px 20px;box-shadow:5px 5px 0 #16223D;">
        <div style="width:78px;height:78px;border-radius:16px;background:#E5EBFF;border:3px solid #16223D;display:flex;align-items:center;justify-content:center;flex:none;">
          <svg width="52" height="52" viewBox="0 0 64 64"><g stroke="#16223D" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
            <circle cx="17" cy="27" r="5"/><path d="M21 30 L49 42"/><path d="M22 31 L20 50 L29 50"/><path d="M49 42 L53 50"/><path d="M11 50 L56 50" stroke-dasharray="2 6"/>
          </g></svg>
        </div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:29px;font-weight:900;">平板支撑</div>
          <div style="margin-top:8px;">
            <span style="font-family:'Fredoka','Noto Sans SC',sans-serif;display:inline-block;background:#EEF1F8;border-radius:999px;padding:5px 15px;white-space:nowrap;font-size:18px;font-weight:700;">4 组</span>
          </div>
        </div>
        <div style="flex:none;text-align:right;line-height:1;margin-right:4px;white-space:nowrap;">
          <span style="font-family:'Fredoka','Noto Sans SC',sans-serif;font-size:34px;font-weight:700;color:#2E5CFF;">1</span><span style="font-size:16px;font-weight:700;color:#2E5CFF;margin-left:3px;">分钟</span>
        </div>
        <div style="width:36px;height:36px;border-radius:50%;background:#2E5CFF;border:3px solid #16223D;display:flex;align-items:center;justify-content:center;flex:none;">
          <svg width="20" height="20" viewBox="0 0 24 24"><path d="M5 13 L10 18 L19 6" stroke="#fff" stroke-width="3.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>

      <!-- 高位下拉 -->
      <div style="display:flex;align-items:center;gap:18px;background:#fff;border:3px solid #16223D;border-radius:16px;padding:12px 20px;box-shadow:5px 5px 0 #16223D;">
        <div style="width:78px;height:78px;border-radius:16px;background:#E5EBFF;border:3px solid #16223D;display:flex;align-items:center;justify-content:center;flex:none;">
          <svg width="52" height="52" viewBox="0 0 64 64"><g stroke="#16223D" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
            <path d="M32 7 L32 16"/><path d="M15 16 L49 16"/><path d="M15 16 L11 23"/><path d="M49 16 L53 23"/><circle cx="32" cy="42" r="5.5"/><path d="M20 18 L27 37"/><path d="M44 18 L37 37"/>
          </g></svg>
        </div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:29px;font-weight:900;">高位下拉</div>
          <div style="margin-top:8px;">
            <span style="font-family:'Fredoka','Noto Sans SC',sans-serif;display:inline-block;background:#EEF1F8;border-radius:999px;padding:5px 15px;white-space:nowrap;font-size:18px;font-weight:700;">4 组 × 10 次</span>
          </div>
        </div>
        <div style="flex:none;text-align:right;line-height:1;margin-right:4px;white-space:nowrap;">
          <span style="font-family:'Fredoka','Noto Sans SC',sans-serif;font-size:34px;font-weight:700;color:#2E5CFF;">40</span><span style="font-size:16px;font-weight:700;color:#2E5CFF;margin-left:3px;">kg</span>
        </div>
        <div style="width:36px;height:36px;border-radius:50%;background:#2E5CFF;border:3px solid #16223D;display:flex;align-items:center;justify-content:center;flex:none;">
          <svg width="20" height="20" viewBox="0 0 24 24"><path d="M5 13 L10 18 L19 6" stroke="#fff" stroke-width="3.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>

      <!-- 拉伸柔韧 -->
      <div style="display:flex;align-items:center;gap:12px;margin-top:5px;">
        <div style="width:36px;height:36px;border-radius:10px;background:#FFD23F;border:3px solid #16223D;display:flex;align-items:center;justify-content:center;flex:none;">
          <svg width="20" height="20" viewBox="0 0 24 24"><g stroke="#16223D" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"><circle cx="12" cy="5" r="2" fill="#16223D" stroke="none"/><path d="M12 7.5 V13 M12 9 L8 5.5 M12 9 L16 5.5 M12 13 L9 19 M12 13 L15 19"/></g></svg>
        </div>
        <span style="font-size:23px;font-weight:900;">拉伸柔韧</span>
        <span style="font-family:'Fredoka',sans-serif;letter-spacing:2px;font-size:14px;color:#C79A0E;font-weight:600;">STRETCH</span>
        <span style="font-size:15px;color:#a99250;font-weight:600;white-space:nowrap;">· 收尾拉伸放松一下哦</span>
        <div style="flex:1;border-bottom:3px solid #E4E8F2;margin-bottom:5px;"></div>
      </div>

    </div>

    <!-- footer -->
    <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-top:18px;">
      <div>
        <div style="font-size:24px;font-weight:900;color:#16223D;">坚持运动，遇见更好的自己</div>
        <div style="font-family:'Fredoka',sans-serif;letter-spacing:2px;font-size:15px;color:#2E5CFF;font-weight:600;margin-top:5px;">KEEP MOVING →</div>
      </div>
      <div style="position:relative;width:112px;height:96px;flex:none;background:#FF6A2B;border:3px solid #16223D;border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;transform:rotate(-4deg);">
        <div style="font-family:'Fredoka',sans-serif;font-weight:700;font-size:16px;letter-spacing:1px;">GOOD</div>
        <div style="font-family:'Fredoka',sans-serif;font-weight:700;font-size:24px;line-height:1;">JOB!</div>
        <div style="font-size:13px;font-weight:700;margin-top:3px;">打卡 +1</div>
        <div style="position:absolute;left:18px;bottom:-9px;width:15px;height:15px;background:#FF6A2B;border-right:3px solid #16223D;border-bottom:3px solid #16223D;transform:rotate(45deg);"></div>
      </div>
    </div>

  </div>
</div>
</x-dc>
